<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPPEM Concursos — Preparação para Concursos Policiais (PMPE)</title>
  <meta name="description" content="Entre para a lista do CPPEM e receba orientação para concursos policiais. PM, PC, PRF, PF e Penal." />
  <meta property="og:title" content="CPPEM Concursos — A sua preparação para vestir a farda começa com direção." />
  <meta property="og:image" content="/assets/bg-collage.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="/assets/logo-cppem.png" />
</head>
<body>

  <!-- Fundo mesclado (colagem de todas as imagens) -->
  <div class="bg" aria-hidden="true"></div>
  <div class="bg-scrim" aria-hidden="true"></div>

  <main class="page">

    <!-- Logo CPPEM -->
    <img class="logo" src="/assets/logo-cppem.png" alt="CPPEM Concursos Públicos" />

    <!-- 1. HEADLINE -->
    <h1 class="headline">
      A sua preparação para <span class="hl">vestir a farda</span> começa com direção.
    </h1>
    <p class="sub">
      Se cadastre no CPPEM e receba orientação para estudar com método, disciplina e foco nos concursos policiais.
    </p>

    <!-- 2. FORMULÁRIO  +  3. BOTÃO -->
    <form class="form" id="lead-form" novalidate>
      <div class="field">
        <input type="text" id="nome" name="nome" autocomplete="name" placeholder="Nome completo" required />
        <span class="error" data-error-for="nome"></span>
      </div>
      <div class="field">
        <input type="email" id="email" name="email" autocomplete="email" placeholder="E-mail" required />
        <span class="error" data-error-for="email"></span>
      </div>
      <div class="field">
        <input type="tel" id="telefone" name="telefone" inputmode="numeric" placeholder="(00) 00000-0000" required />
        <span class="error" data-error-for="telefone"></span>
      </div>

      <button type="submit" class="cta">QUERO RECEBER ORIENTAÇÃO</button>
      <p class="note">Cadastro gratuito. Seus dados estão seguros.</p>
      <p class="success" id="form-success" role="status" hidden>
        Cadastro recebido. Em breve, nossa equipe entrará em contato.
      </p>
    </form>

    <!-- 4. PROVAS SOCIAIS — slots para fotos dos alunos com o Prof. Everton Mota -->
    <section class="social">
      <span class="social__eyebrow">Nossos alunos</span>

      <!-- Para encaixar a foto: troque o conteúdo do .photo por
           <img src="/assets/aluno-1.jpg" alt="Aluno aprovado com o Prof. Everton Mota" />
           Mantém o mesmo formato em todos. -->
      <div class="gallery">
        <figure class="photo"></figure>
        <figure class="photo"></figure>
        <figure class="photo"></figure>
        <figure class="photo"></figure>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
